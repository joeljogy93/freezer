<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Freezer</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, sans-serif; background: #f5f5f5; color: #111; font-size: 14px; }
.bar { background: #fff; border-bottom: 1px solid #e0e0e0; padding: 12px 16px; display: flex; align-items: center; gap: 8px; position: sticky; top: 0; z-index: 10; flex-wrap: wrap; }
.bar h1 { font-size: 15px; font-weight: 700; flex: 1; min-width: 80px; }
.bar input { border: 1px solid #ddd; border-radius: 6px; padding: 6px 10px; font-size: 13px; width: 140px; outline: none; }
.bar input:focus { border-color: #999; }
button { cursor: pointer; border: none; border-radius: 6px; font-size: 13px; padding: 6px 12px; }
.btn-dark { background: #111; color: #fff; font-weight: 600; }
.btn-ghost { background: none; border: 1px solid #ddd; color: #555; }
.filters { padding: 8px 16px; display: flex; gap: 6px; background: #fff; border-bottom: 1px solid #e0e0e0; }
.ftag { border: 1px solid #ddd; border-radius: 20px; padding: 4px 12px; font-size: 12px; color: #555; cursor: pointer; background: none; }
.ftag.on { background: #111; color: #fff; border-color: #111; }
.stats { padding: 6px 16px; font-size: 11px; color: #aaa; }
.content { padding: 10px 16px 60px; }
.cat-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: #bbb; margin: 16px 0 5px; display: flex; align-items: center; gap: 6px; }
.cat-label:first-child { margin-top: 4px; }
.cat-count { font-weight: 400; color: #ddd; }
.row { background: #fff; border-radius: 7px; padding: 9px 11px; margin-bottom: 3px; display: flex; align-items: center; gap: 8px; border-left: 3px solid #eee; }
.row.cooked { border-left-color: #22c55e; }
.row.raw { border-left-color: #3b82f6; }
.row-name { flex: 1; font-size: 13px; font-weight: 500; }
.row-note { font-size: 11px; color: #aaa; margin-top: 1px; }
.row-qty input { width: 75px; border: 1px solid #eee; border-radius: 5px; padding: 4px 6px; font-size: 12px; text-align: center; outline: none; color: #555; }
.row-qty input:focus { border-color: #bbb; }
.badge { font-size: 10px; padding: 2px 6px; border-radius: 8px; font-weight: 600; white-space: nowrap; }
.badge.cooked { background: #dcfce7; color: #16a34a; }
.badge.raw { background: #dbeafe; color: #2563eb; }
.act button { background: none; border: none; font-size: 13px; padding: 2px 3px; opacity: 0.3; cursor: pointer; }
.act button:hover { opacity: 1; }
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 100; align-items: flex-end; justify-content: center; }
.overlay.on { display: flex; }
.sheet { background: #fff; border-radius: 14px 14px 0 0; padding: 20px 16px 32px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; animation: up 0.18s ease; }
@keyframes up { from { transform: translateY(20px); opacity: 0; } to { transform: none; opacity: 1; } }
.sheet h2 { font-size: 15px; font-weight: 700; margin-bottom: 14px; }
.field { margin-bottom: 11px; }
.field label { display: block; font-size: 11px; color: #999; margin-bottom: 3px; }
.field input, .field select { width: 100%; border: 1px solid #ddd; border-radius: 6px; padding: 8px 10px; font-size: 13px; outline: none; background: #fff; }
.field input:focus, .field select:focus { border-color: #999; }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.mact { display: flex; gap: 8px; margin-top: 14px; }
.mact button { flex: 1; padding: 10px; font-size: 13px; font-weight: 600; }
.cat-item { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid #f2f2f2; font-size: 13px; }
.cat-item span { flex: 1; }
.cat-item button { background: none; border: none; color: #ccc; font-size: 17px; line-height: 1; padding: 0 2px; }
.cat-item button:hover { color: #ef4444; }
.add-cat-row { display: flex; gap: 8px; }
.add-cat-row input { flex: 1; border: 1px solid #ddd; border-radius: 6px; padding: 7px 10px; font-size: 13px; outline: none; }
.add-cat-row input:focus { border-color: #999; }
.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #111; color: #fff; font-size: 12px; padding: 7px 16px; border-radius: 20px; display: none; z-index: 200; }
</style>
</head>
<body>

<div class="bar">
  <h1>❄️ Freezer</h1>
  <input id="search" placeholder="Search…" oninput="render()">
  <button class="btn-ghost" onclick="openCat()">+ Category</button>
  <button class="btn-ghost" onclick="document.getElementById('bo').classList.add('on')">Backup</button>
  <button class="btn-dark" onclick="openAdd()">+ Item</button>
</div>

<div class="filters">
  <button class="ftag on" id="fa" onclick="filt('all')">All</button>
  <button class="ftag" id="fc" onclick="filt('cooked')">Cooked</button>
  <button class="ftag" id="fr" onclick="filt('raw')">Raw</button>
</div>

<div class="stats" id="stats"></div>
<div class="content" id="content"></div>

<!-- ITEM MODAL -->
<div class="overlay" id="mo">
  <div class="sheet">
    <h2 id="mtitle">Add Item</h2>
    <div class="field"><label>Name</label><input id="fn" placeholder="e.g. Fish Curry"></div>
    <div class="row2">
      <div class="field"><label>Quantity</label><input id="fq" placeholder="e.g. 4 ppl"></div>
      <div class="field"><label>State</label><select id="fs"><option>Cooked</option><option>Uncooked</option></select></div>
    </div>
    <div class="field"><label>Category</label><select id="fcat"></select></div>
    <div class="field"><label>Notes</label><input id="fnotes" placeholder="Optional"></div>
    <div class="mact">
      <button class="btn-ghost" onclick="closeAll()">Cancel</button>
      <button class="btn-dark" onclick="saveItem()">Save</button>
    </div>
  </div>
</div>

<!-- CATEGORY MODAL -->
<div class="overlay" id="co">
  <div class="sheet">
    <h2>Categories</h2>
    <div class="add-cat-row">
      <input id="cn" placeholder="New category name…">
      <button class="btn-dark" onclick="addCat()">Add</button>
    </div>
    <div style="margin-top:12px" id="clist"></div>
    <div class="mact"><button class="btn-ghost" style="width:100%" onclick="closeAll()">Done</button></div>
  </div>
</div>

<!-- BACKUP MODAL -->
<div class="overlay" id="bo">
  <div class="sheet">
    <h2>Backup & Restore</h2>
    <p style="font-size:12px;color:#999;margin-bottom:14px;line-height:1.6">Data is saved in this browser. Export to back up or transfer to another device.</p>
    <div class="mact">
      <button class="btn-ghost" onclick="exportData()">⬇ Export</button>
      <label class="btn-dark" style="flex:1;text-align:center;padding:10px;border-radius:6px;font-weight:600;cursor:pointer;font-size:13px">
        ⬆ Import <input type="file" accept=".json" onchange="importData(event)" style="display:none">
      </label>
    </div>
    <div class="mact" style="margin-top:8px"><button class="btn-ghost" style="width:100%" onclick="closeAll()">Close</button></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>

  {id:50,name:'Beetroot (Raw)',        qty:'1/2 piece',   state:'Uncooked', cat:'Vegetables & Fruits',    notes:'Batch 3',            date:'2025-05-07'},
  {id:51,name:'Capsicum',             qty:'1/4 piece',   state:'Uncooked', cat:'Vegetables & Fruits',    notes:'',                   date:'2025-05-07'},
  {id:52,name:'Drumstick',            qty:'100g',        state:'Uncooked', cat:'Vegetables & Fruits',    notes:'',                   date:'2025-05-07'},
  {id:53,name:'Mango (Frozen)',       qty:'1/2 packet',  state:'Uncooked', cat:'Vegetables & Fruits',    notes:'Batch 1',            date:'2025-05-07'},
  {id:54,name:'Mango (Frozen)',       qty:'1/4 packet',  state:'Uncooked', cat:'Vegetables & Fruits',    notes:'Batch 2',            date:'2025-05-07'},

  {id:57,name:'Aluva',               qty:'~20 pcs',     state:'Uncooked', cat:'Sweets & Snacks',        notes:'',                   date:'2025-05-07'},

let items=[], cats=[], nextId=100, activeFilter='all', editId=null;

function load() {
  try {
    cats = JSON.parse(localStorage.getItem('fCats')||'null') || JSON.parse(JSON.stringify(DEF_CATS));
    const s = localStorage.getItem('fItems');
    items = s ? JSON.parse(s) : JSON.parse(JSON.stringify(DEF_ITEMS));
    nextId = Math.max(...items.map(i=>i.id), 99) + 1;
  } catch(e) {
    cats = JSON.parse(JSON.stringify(DEF_CATS));
    items = JSON.parse(JSON.stringify(DEF_ITEMS));
  }
}

function save() {
  localStorage.setItem('fItems', JSON.stringify(items));
  localStorage.setItem('fCats', JSON.stringify(cats));
}

function filt(f) {
  activeFilter = f;
  document.querySelectorAll('.ftag').forEach(b => b.classList.remove('on'));
  document.getElementById(f==='all'?'fa':f==='cooked'?'fc':'fr').classList.add('on');
  render();
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const list = items.filter(i => {
    const m = !q || i.name.toLowerCase().includes(q) || i.cat.toLowerCase().includes(q) || (i.notes||'').toLowerCase().includes(q);
    const s = activeFilter==='all' || (activeFilter==='cooked'&&i.state==='Cooked') || (activeFilter==='raw'&&i.state==='Uncooked');
    return m && s;
  });

  document.getElementById('stats').textContent =
    `${items.length} items · ${items.filter(i=>i.state==='Cooked').length} cooked · ${items.filter(i=>i.state==='Uncooked').length} raw`;

  const grouped = {};
  cats.forEach(c => grouped[c.name] = []);
  list.forEach(i => { if (!grouped[i.cat]) grouped[i.cat] = []; grouped[i.cat].push(i); });

  let html = '';
  cats.forEach(cat => {
    const ci = grouped[cat.name] || [];
    if (!ci.length) return;
    html += `<div class="cat-label">${cat.name} <span class="cat-count">${ci.length}</span></div>`;
    ci.forEach(item => {
      const sc = item.state==='Cooked' ? 'cooked' : 'raw';
      html += `<div class="row ${sc}">
        <div style="flex:1">
          <div class="row-name">${item.name}</div>
          ${item.notes ? `<div class="row-note">${item.notes}</div>` : ''}
        </div>
        <span class="badge ${sc}">${item.state==='Cooked'?'Cooked':'Raw'}</span>
        <div class="row-qty"><input value="${item.qty}" onchange="upQty(${item.id},this.value)" onblur="upQty(${item.id},this.value)"></div>
        <div class="act">
          <button onclick="openEdit(${item.id})">✏️</button>
          <button onclick="del(${item.id})">🗑</button>
        </div>
      </div>`;
    });
  });

  document.getElementById('content').innerHTML = html || '<p style="color:#bbb;padding:30px 0;text-align:center">No items.</p>';
}

function upQty(id, v) {
  const i = items.find(x => x.id===id);
  if (i) { i.qty = v; save(); toast('Saved'); }
}

function del(id) {
  const i = items.find(x => x.id===id);
  if (i && confirm(`Remove "${i.name}"?`)) { items = items.filter(x => x.id!==id); save(); render(); toast('Removed'); }
}

function fillCatSelect(sel) {
  document.getElementById('fcat').innerHTML = cats.map(c => `<option ${c.name===sel?'selected':''}>${c.name}</option>`).join('');
}

function openAdd() {
  editId = null;
  document.getElementById('mtitle').textContent = 'Add Item';
  ['fn','fq','fnotes'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('fs').value = 'Cooked';
  fillCatSelect('Kerala Curries & Sides');
  document.getElementById('mo').classList.add('on');
  setTimeout(() => document.getElementById('fn').focus(), 100);
}

function openEdit(id) {
  const i = items.find(x => x.id===id);
  if (!i) return;
  editId = id;
  document.getElementById('mtitle').textContent = 'Edit Item';
  document.getElementById('fn').value = i.name;
  document.getElementById('fq').value = i.qty;
  document.getElementById('fs').value = i.state;
  document.getElementById('fnotes').value = i.notes;
  fillCatSelect(i.cat);
  document.getElementById('mo').classList.add('on');
}

function saveItem() {
  const name = document.getElementById('fn').value.trim();
  const qty  = document.getElementById('fq').value.trim();
  if (!name || !qty) return alert('Name and quantity required.');
  if (editId) {
    const i = items.find(x => x.id===editId);
    Object.assign(i, { name, qty, state: document.getElementById('fs').value, cat: document.getElementById('fcat').value, notes: document.getElementById('fnotes').value.trim() });
  } else {
    items.push({ id: nextId++, name, qty, state: document.getElementById('fs').value, cat: document.getElementById('fcat').value, notes: document.getElementById('fnotes').value.trim(), date: new Date().toISOString().slice(0,10) });
  }
  save(); closeAll(); render(); toast(editId ? 'Updated' : 'Added');
}

function openCat() {
  document.getElementById('cn').value = '';
  renderCatList();
  document.getElementById('co').classList.add('on');
  setTimeout(() => document.getElementById('cn').focus(), 100);
}

function renderCatList() {
  document.getElementById('clist').innerHTML = cats.map((c,i) =>
    `<div class="cat-item"><span>${c.name}</span><button onclick="delCat(${i})">×</button></div>`).join('');
}

function addCat() {
  const name = document.getElementById('cn').value.trim();
  if (!name) return;
  if (cats.find(c => c.name.toLowerCase()===name.toLowerCase())) return alert('Already exists.');
  cats.push({ id: 'c'+Date.now(), name });
  save();
  document.getElementById('cn').value = '';
  renderCatList();
  toast('Category added');
}

function delCat(i) {
  const c = cats[i];
  if (items.some(x => x.cat===c.name)) {
    if (!confirm(`"${c.name}" has items. Move them to Other?`)) return;
    items.forEach(x => { if (x.cat===c.name) x.cat='Other'; });
  } else if (!confirm(`Delete "${c.name}"?`)) return;
  cats.splice(i, 1); save(); renderCatList(); toast('Removed');
}

function closeAll() {
  ['mo','co','bo'].forEach(id => document.getElementById(id).classList.remove('on'));
  editId = null; render();
}

function exportData() {
  const b = new Blob([JSON.stringify({items, cats, date: new Date().toISOString()}, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(b);
  a.download = `freezer_${new Date().toISOString().slice(0,10)}.json`;
  a.click(); toast('Exported!');
}

function importData(e) {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = ev => {
    try {
      const d = JSON.parse(ev.target.result);
      if (!d.items) return alert('Invalid file.');
      if (!confirm(`Import ${d.items.length} items?`)) return;
      items = d.items; if (d.cats) cats = d.cats;
      nextId = Math.max(...items.map(i=>i.id), 99)+1;
      save(); closeAll(); toast(`Imported ${items.length} items`);
    } catch { alert('Could not read file.'); }
  };
  r.readAsText(f); e.target.value = '';
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  clearTimeout(t._t); t._t = setTimeout(() => t.style.display='none', 1800);
}

['mo','co','bo'].forEach(id => document.getElementById(id).addEventListener('click', e => { if (e.target.id===id) closeAll(); }));
document.addEventListener('keydown', e => {
  if (e.key==='Escape') closeAll();
  if (e.key==='Enter' && document.getElementById('mo').classList.contains('on')) saveItem();
  if (e.key==='Enter' && document.getElementById('co').classList.contains('on')) addCat();
});

load(); render();
</script>
</body>
