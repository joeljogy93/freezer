<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1,maximum-scale=1'><title>Freezer Inventory Plain</title><style>
:root{--bg:#050505;--p:#101010;--p2:#181818;--l:#292929;--t:#eee;--m:#888}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--t);font-family:Arial,sans-serif;font-size:13px}.app{max-width:900px;margin:auto}.top{position:sticky;top:0;z-index:5;background:#050505;border-bottom:1px solid var(--l);padding:10px}.head{display:flex;justify-content:space-between;gap:8px;align-items:center}h1{font-size:18px;margin:0}.stats{color:var(--m);font-size:12px;margin-top:4px}.stats b{color:var(--t)}button,input,select,textarea{font-family:inherit}.btn{border:1px solid var(--l);background:var(--p);color:var(--t);border-radius:7px;padding:7px 9px;font-size:12px;cursor:pointer}.primary{background:#eee;color:#000;border-color:#eee;font-weight:700}.danger{color:#ffb4b4}.bar{display:grid;grid-template-columns:1fr auto auto auto;gap:6px;margin-top:8px}input,select,textarea{width:100%;border:1px solid var(--l);background:var(--p);color:var(--t);border-radius:7px;padding:8px;font-size:13px}.active{background:#eee!important;color:#000!important}.content{padding:10px}.mini{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}.table{border:1px solid var(--l);border-radius:9px;overflow:hidden}.th,.row{display:grid;grid-template-columns:1.45fr 70px 55px 44px 40px}.th{background:#111;color:var(--m);font-size:10px;text-transform:uppercase}.th div,.row>div{padding:8px;border-right:1px solid var(--l)}.th div:last-child,.row>div:last-child{border-right:0}.row{border-top:1px solid var(--l);background:#080808}.name{font-weight:700}.sub{color:var(--m);font-size:11px;margin-top:2px}.qty{font-weight:700;white-space:nowrap}.status{color:var(--m);font-size:11px}.sheetbg{position:fixed;inset:0;background:#0009;display:none;z-index:10}.sheet{position:fixed;left:0;right:0;bottom:0;max-height:88vh;overflow:auto;background:#0b0b0b;border-top:1px solid var(--l);padding:12px;display:none;z-index:11}.sheethead{display:flex;justify-content:space-between;align-items:center}.title{font-size:16px;font-weight:700}.x{border:0;background:transparent;color:var(--t);font-size:23px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}label{display:block;color:var(--m);font-size:11px;margin:9px 0 4px}.actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}.catrow{display:grid;grid-template-columns:1fr auto auto;gap:6px;align-items:center;border-top:1px solid var(--l);padding:8px 0}.empty{border:1px solid var(--l);border-radius:9px;padding:18px;text-align:center;color:var(--m);display:none}.toast{position:fixed;left:50%;bottom:12px;transform:translateX(-50%);background:#1a1a1a;border:1px solid var(--l);border-radius:20px;padding:8px 11px;display:none;z-index:20}
@media(max-width:650px){.bar{grid-template-columns:1fr 1fr 1fr}.bar input{grid-column:1/4}.th{display:none}.row{grid-template-columns:1fr 68px 40px 36px;grid-template-areas:'n q e d' 'n s e d'}.n{grid-area:n}.q{grid-area:q}.s{grid-area:s}.e{grid-area:e}.d{grid-area:d}.row>div{border-right:0;padding:8px}.grid{grid-template-columns:1fr}}
</style></head><body><div class='app'><div class='top'><div class='head'><div><h1>Freezer Inventory</h1><div class='stats'><b id='total'>0</b> items &nbsp; <b id='cooked'>0</b> cooked &nbsp; <b id='raw'>0</b> raw</div></div><button class='btn primary' onclick='openItem()'>Add</button></div><div class='bar'><input id='search' placeholder='Search...' oninput='render()'><button id='all' class='btn active' onclick="setF('All')">All</button><button id='cook' class='btn' onclick="setF('Cooked')">Cooked</button><button id='rawb' class='btn' onclick="setF('Raw')">Raw</button></div></div><div class='content'><div class='mini'><button class='btn' onclick='openCat()'>Categories</button><button class='btn' onclick='openBackup()'>Backup</button><button class='btn' onclick='resetAll()'>Reset</button></div><div id='table' class='table'><div class='th'><div>Item</div><div>Qty</div><div>Status</div><div>Edit</div><div>Del</div></div><div id='rows'></div></div><div id='empty' class='empty'>No items found.</div></div></div>
<div id='bg' class='sheetbg' onclick='closeS()'></div><div id='itemS' class='sheet'><div class='sheethead'><div id='formTitle' class='title'>Add Item</div><button class='x' onclick='closeS()'>×</button></div><label>Item</label><input id='nm'><div class='grid'><div><label>Category</label><select id='cat'></select></div><div><label>Status</label><select id='st'><option>Cooked</option><option>Uncooked</option><option>Marinated</option><option>Ready to heat</option></select></div></div><div class='grid'><div><label>Qty</label><input id='qt' type='number' step='.25' value='1'></div><div><label>Unit</label><input id='un' value='box'></div></div><label>Note</label><input id='note'><div class='actions'><button class='btn primary' onclick='saveItem()'>Save</button><button class='btn' onclick='clearForm()'>Clear</button><button class='btn' onclick='openCat()'>New Category</button></div></div>
<div id='catS' class='sheet'><div class='sheethead'><div class='title'>Categories</div><button class='x' onclick='closeS()'>×</button></div><label>New category</label><div class='grid'><input id='newCat'><button class='btn primary' onclick='addCat()'>Add</button></div><div id='catList'></div></div>
<div id='backupS' class='sheet'><div class='sheethead'><div class='title'>Backup</div><button class='x' onclick='closeS()'>×</button></div><button class='btn primary' onclick='exportB()'>Copy Backup</button><label>Restore text</label><textarea id='backupText'></textarea><div class='actions'><button class='btn' onclick='restoreB()'>Restore</button></div></div><div id='toast' class='toast'></div>
<script>
const IK='plain_items_v2',CK='plain_cats_v2';let edit=null,f='All';function gid(){return Date.now().toString(36)+Math.random().toString(36).slice(2)}function load(k){try{return JSON.parse(localStorage.getItem(k))}catch{return null}}function save(){localStorage.setItem(IK,JSON.stringify(items));localStorage.setItem(CK,JSON.stringify(cats))}function e(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function msg(x){toast.textContent=x;toast.style.display='block';clearTimeout(msg.t);msg.t=setTimeout(()=>toast.style.display='none',1100)}
let cats=load(CK)||['MEAT & POULTRY','BEEF','FISH & SEAFOOD','VEGETABLES','COOKED CURRY / SIDES','BREAD & BREAKFAST','READY MEALS','SNACKS','CHUTNEY & SAUCE','COCONUT & PANTRY','FRUIT','SWEETS & DESSERT','COOKED RICE','OTHER'];
let start=[['Chicken Roast','MEAT & POULTRY',5,'ppl','Cooked',''],['Pepper Chicken','MEAT & POULTRY',2,'ppl','Cooked',''],['Chicken (Marinated)','MEAT & POULTRY',5,'ppl','Uncooked','Breakfast prep'],['Chicken Cutlet','MEAT & POULTRY',5,'pcs','Uncooked','Batch 1'],['Chicken Cutlet','MEAT & POULTRY',8,'pcs','Uncooked','Batch 2'],['Chicken Cutlet','MEAT & POULTRY',10,'pcs','Uncooked','Batch 3'],['Beef Curry','BEEF',4,'ppl','Cooked',''],['Basa Fish','FISH & SEAFOOD',2,'fillet','Uncooked',''],['Fish Fry Marinated','FISH & SEAFOOD',2,'ppl','Uncooked',''],['Meen Peera','FISH & SEAFOOD',1.5,'ppl','Cooked',''],['Beans','VEGETABLES',.75,'packet','Uncooked',''],['Kovakka','VEGETABLES',.5,'packet','Uncooked',''],['Mixed Broccoli Cauliflower Carrot','VEGETABLES',.75,'packet','Uncooked',''],['Carrot','VEGETABLES',.5,'packet','Uncooked',''],['Beetroot','VEGETABLES',1.5,'piece','Uncooked',''],['Kappa','VEGETABLES',2,'ppl','Uncooked',''],['Cherupayar','COOKED CURRY / SIDES',2,'boxes','Cooked',''],['Manga Curry','COOKED CURRY / SIDES',2,'boxes','Cooked',''],['Beetroot Pachadi','COOKED CURRY / SIDES',2,'boxes','Cooked',''],['Erissery','COOKED CURRY / SIDES',2,'boxes','Cooked',''],['Avial','COOKED CURRY / SIDES',5,'boxes','Cooked',''],['Vazhakka Boiled','COOKED CURRY / SIDES',2,'boxes','Cooked',''],['Cauliflower Potato','COOKED CURRY / SIDES',2,'ppl','Cooked',''],['Paneer Curry','COOKED CURRY / SIDES',2,'ppl','Cooked',''],['Tortilla','BREAD & BREAKFAST',7,'pcs','Uncooked',''],['Porotta','BREAD & BREAKFAST',10,'pcs','Uncooked',''],['Puttu','BREAD & BREAKFAST',1,'ppl','Cooked',''],['Pizza Olive','READY MEALS',2,'ppl','Cooked',''],['Pizza Cheese Stick','READY MEALS',4,'ppl','Cooked',''],['Pizza Onion Beef','READY MEALS',4,'ppl','Cooked',''],['Peanut Chutney','CHUTNEY & SAUCE',2,'ppl','Cooked',''],['Lemon Sauce','CHUTNEY & SAUCE',2,'ppl','Cooked','For cooked chicken'],['Coconut Slices','COCONUT & PANTRY',.75,'packet','Uncooked',''],['Grated Coconut','COCONUT & PANTRY',100,'grams','Uncooked',''],['Amla','FRUIT',.5,'packet','Uncooked',''],['Mango','FRUIT',.75,'packet','Uncooked',''],['Brownie','SWEETS & DESSERT',3,'ppl','Cooked',''],['Kunafa Dough','SWEETS & DESSERT',50,'grams','Uncooked',''],['Aluva','SWEETS & DESSERT',20,'pcs','Cooked',''],['Basmathi Rice','COOKED RICE',.1,'box','Cooked','']].map(x=>({id:gid(),name:x[0],cat:x[1],qty:x[2],unit:x[3],st:x[4],note:x[5]}));let items=load(IK)||start;
function updCats(){cat.innerHTML=cats.map(c=>`<option>${e(c)}</option>`).join('')}function setF(x){f=x;all.classList.toggle('active',x=='All');cook.classList.toggle('active',x=='Cooked');rawb.classList.toggle('active',x=='Raw');render()}function render(){updCats();let q=search.value.toLowerCase(),a=items.filter(i=>+i.qty>0);total.textContent=a.length;cooked.textContent=a.filter(i=>i.st=='Cooked').length;raw.textContent=a.filter(i=>i.st!='Cooked').length;let l=a.filter(i=>(`${i.name} ${i.cat} ${i.st} ${i.note}`.toLowerCase().includes(q))&&(f=='All'||(f=='Cooked'&&i.st=='Cooked')||(f=='Raw'&&i.st!='Cooked'))).sort((a,b)=>a.cat.localeCompare(b.cat)||a.name.localeCompare(b.name));rows.innerHTML='';table.style.display=l.length?'block':'none';empty.style.display=l.length?'none':'block';l.forEach(i=>{let r=document.createElement('div');r.className='row';r.innerHTML=`<div class='n'><div class='name'>${e(i.name)}</div><div class='sub'>${e(i.cat)}${i.note?' · '+e(i.note):''}</div></div><div class='q qty'>${i.qty} ${e(i.unit)}</div><div class='s status'>${e(i.st)}</div><div class='e'><button class='btn' onclick="editItem('${i.id}')">Edit</button></div><div class='d'><button class='btn danger' onclick="delItem('${i.id}')">Del</button></div>`;rows.appendChild(r)})}
function openS(x){bg.style.display='block';x.style.display='block'}function closeS(){bg.style.display='none';document.querySelectorAll('.sheet').forEach(x=>x.style.display='none')}function openItem(){clearForm();openS(itemS)}function openCat(){renderCats();openS(catS)}function openBackup(){openS(backupS)}function clearForm(){edit=null;formTitle.textContent='Add Item';nm.value='';qt.value=1;un.value='box';st.value='Cooked';note.value='';updCats()}function saveItem(){if(!nm.value.trim()){alert('Enter item');return}let it={id:edit||gid(),name:nm.value.trim(),cat:cat.value,qty:+qt.value||0,unit:un.value.trim()||'box',st:st.value,note:note.value.trim()};items=edit?items.map(i=>i.id==edit?it:i):[it,...items];save();closeS();render();msg(edit?'Updated':'Added')}function editItem(id){let i=items.find(x=>x.id==id);edit=id;formTitle.textContent='Edit Item';nm.value=i.name;cat.value=i.cat;qt.value=i.qty;un.value=i.unit;st.value=i.st;note.value=i.note||'';openS(itemS)}function delItem(id){if(!confirm('Delete?'))return;items=items.filter(i=>i.id!=id);save();render();msg('Deleted')}function addCat(){let n=newCat.value.trim().toUpperCase();if(!n)return;if(cats.some(c=>c.toLowerCase()==n.toLowerCase())){msg('Exists');return}cats.push(n);cats.sort();newCat.value='';save();renderCats();updCats();msg('Category added')}function renderCats(){catList.innerHTML='';cats.forEach(c=>{let n=items.filter(i=>i.cat==c&&+i.qty>0).length,d=document.createElement('div');d.className='catrow';d.innerHTML=`<div><b>${e(c)}</b><div class='sub'>${n} items</div></div><button class='btn' onclick="renCat('${c.replace(/'/g,"\\'")}')">Rename</button><button class='btn danger' onclick="delCat('${c.replace(/'/g,"\\'")}')">Del</button>`;catList.appendChild(d)})}function renCat(o){let n=prompt('New category',o);if(!n)return;n=n.trim().toUpperCase();cats=cats.map(c=>c==o?n:c);items=items.map(i=>i.cat==o?{...i,cat:n}:i);save();renderCats();render()}function delCat(c){if(items.some(i=>i.cat==c&&+i.qty>0)){alert('Move/delete items first');return}cats=cats.filter(x=>x!=c);save();renderCats();render()}function exportB(){let t=JSON.stringify({cats,items});backupText.value=t;navigator.clipboard?.writeText(t);msg('Copied')}function restoreB(){try{let d=JSON.parse(backupText.value);cats=d.cats;items=d.items;save();closeS();render()}catch{alert('Invalid')}}function resetAll(){if(!confirm('Reset all?'))return;localStorage.removeItem(IK);localStorage.removeItem(CK);location.reload()}render();
</script></body></html>
